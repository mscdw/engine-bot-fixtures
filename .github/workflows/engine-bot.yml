name: engine-bot

# Smoke target for engine-bot v0.1 (suggest mode).  On every pull
# request that touches *.tf files, run the bot:  scan changed files
# against canonical bundles published to mscdw/engine-bundles, post
# inline review comments with one-click suggested-change blocks for
# every compliance gap.
#
# During development both engine-bot + this fixtures repo are
# private.  GitHub Actions on personal accounts can't ``uses:`` a
# private cross-repo action directly, so we fetch + install the bot
# via a PAT-authenticated checkout pattern.  When engine-bot ships
# publicly we collapse this back to the single ``uses: mscdw/engine-
# bot@v0.1.0`` line that the engine-bot/action.yml supports.
#
# Required secret on this repo:
#   ENGINE_BOT_TOKEN -- fine-grained PAT scoped to mscdw/engine-bot
#                       only, contents:read.  Used by actions/checkout
#                       to pull the bot's source for pip install.

on:
  pull_request:
    paths:
      - '**/*.tf'
  workflow_dispatch:
    inputs:
      pr_url:
        description: "PR URL to scan (manual runs only)."
        required: true

jobs:
  suggest:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write     # required for posting review comments
    steps:
      - name: Checkout engine-bot (private, pinned to v0.2.2)
        uses: actions/checkout@v4
        with:
          repository: mscdw/engine-bot
          ref: v0.2.2   # production tag (engine-bundles private-fetch)
          token: ${{ secrets.ENGINE_BOT_TOKEN }}
          path: .engine-bot

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install engine-bot
        run: pip install ./.engine-bot

      - name: Resolve PR URL
        id: pr
        run: |
          URL="${{ inputs.pr_url }}"
          if [ -z "$URL" ]; then
            URL="${{ github.event.pull_request.html_url }}"
          fi
          if [ -z "$URL" ]; then
            echo "ERROR: no PR URL.  Set 'pr_url' input or run on a pull_request event."
            exit 1
          fi
          echo "url=${URL}" >> "$GITHUB_OUTPUT"

      - name: engine-bot suggest --post
        env:
          # Bot needs pull_requests:write to post inline review comments
          # on this repo's PR.  Workflow's own GITHUB_TOKEN has the
          # scope (declared in permissions block above) -- the PAT is
          # only for the engine-bot CHECKOUT, not for posting.
          GITHUB_TOKEN: ${{ github.token }}
          # mscdw/engine-bundles is private during development;  the
          # workflow's GITHUB_TOKEN can't fetch bundles cross-repo,
          # so a separate fine-grained PAT (contents:read on
          # mscdw/engine-bundles only) is provided here.  When the
          # bundles repo goes back public, this can be set to "" or
          # removed entirely.
          ENGINE_BUNDLES_TOKEN: ${{ secrets.BUNDLES_READ_TOKEN }}
        run: |
          engine-bot suggest \
            --pr "${{ steps.pr.outputs.url }}" \
            --bundles-tag manual-9f38ef5a70db \
            --post
